name: Main Pipeline for Orchestration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    uses: ./.github/workflows/test_connection.yml
    permissions:
      id-token: write
      contents: read

  test_fleet_health_env:
    needs: verify
    uses: ./.github/workflows/test_fleet_health.yml
    permissions:
      id-token: write
      contents: read

  smoke_test:
    needs: test_fleet_health_env
    uses: ./.github/workflows/smoke_test.yml
    permissions:
      id-token: write
      contents: read

  build_push:
    needs: smoke_test
    uses: ./.github/workflows/bulid_push.yml
    permissions:
      id-token: write
      contents: read

  deploying:
    needs: build_push
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: read