name: Test Fleet

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::949678235787:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Print Private IPs
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="hostname -I" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $CMD_ID"

          sleep 20

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}" \
            --output table